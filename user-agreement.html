<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>破己行动（Ougo）用户使用协议</title>
  <style>
    :root {
      color-scheme: light;
      --text: #111111;
      --muted: #666666;
      --border: #eeeeee;
      --max-width: 820px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Helvetica Neue", Arial, sans-serif;
      line-height: 1.75;
    }

    .container {
      max-width: var(--max-width);
      margin: 80px auto;
      padding: 0 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 14px;
    }

    .date {
      color: var(--muted);
      margin-bottom: 40px;
      font-size: 14px;
    }

    h2 {
      margin-top: 40px;
      margin-bottom: 12px;
      font-size: 20px;
      line-height: 1.4;
    }

    p {
      margin: 16px 0;
      white-space: pre-wrap;
    }

    .status {
      color: var(--muted);
      margin-top: 20vh;
      font-size: 14px;
    }

    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <p class="status">正在加载用户协议…</p>
  </div>

  <script>
    const DATA_URL = "./user-agreement.json";

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderParagraphs(paragraphs) {
      return paragraphs
        .map((paragraph) => `<p>${escapeHTML(paragraph)}</p>`)
        .join("");
    }

    function renderDocument(data) {
      document.title = data.documentTitle;

      const sections = data.sections
        .map((section) => `
          <section>
            <h2>${escapeHTML(section.title)}</h2>
            ${renderParagraphs(section.paragraphs)}
          </section>
        `)
        .join("");

      return `
        <h1>${escapeHTML(data.documentTitle)}</h1>
        <div class="meta">运营主体：${escapeHTML(data.operator.nameCN)} / ${escapeHTML(data.operator.nameEN)}</div>
        <div class="date">生效日期：${escapeHTML(data.effectiveDate)}</div>
        <p>${escapeHTML(data.subtitle)}</p>
        ${sections}
        <footer>${escapeHTML(data.footer)}</footer>
      `;
    }

    async function boot() {
      const app = document.getElementById("app");

      try {
        const response = await fetch(DATA_URL, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        app.innerHTML = renderDocument(data);
      } catch (error) {
        app.innerHTML = `
          <h1>用户使用协议</h1>
          <p class="status">内容加载失败，请稍后刷新重试。</p>
          <p class="status">如问题持续存在，请检查 ${escapeHTML(DATA_URL)} 是否已上传到与本页面相同的目录。</p>
        `;
        console.error("Failed to load legal document:", error);
      }
    }

    boot();
  </script>
</body>
</html>
